<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<meta name="googlebot" content="noindex,nofollow">
<title>全体会議 入力</title>
<link rel="icon" href="assets/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="stylesheet" href="assets/style.css?v=20260525v">
</head>
<body>

<!-- 入力画面（ログイン不要・職員が自部署の実数を入力するだけ） -->
<section id="app" class="page active">
  <div id="stickyhead">
    <header class="topbar">
      <img class="topbar-logo" src="assets/logo.png" alt="たまき青空病院グループ">
      <span class="brand">全体会議 入力</span>
    </header>

    <div class="toolbar">
      <label>対象の会議（月曜）<select id="week"></select>
      <span id="saved-note" class="saved-note"></span>
      <span class="spacer"></span>
      <button id="save" class="btn ghost">一時保存</button>
      <button id="update" class="btn green">更新（再計算）</button>
      <button id="send" class="btn">この部署を提出</button>
      <button id="send-all" class="btn">入力済み全部署を提出</button>
      <button id="export" class="btn ghost">この部署を書き出す</button>
      <button id="export-all" class="btn ghost">入力済み全部署を書き出す</button>
    </div>

    <nav id="fac-tabs" class="tabs"></nav>
    <nav id="dept-tabs" class="tabs sub"></nav>
  </div>

  <div class="formwrap">
    <p style="font-size:13px;color:#667">数字は「先週1週間の実測」を入れてください。下の「② 入力不要」は入力不要です（システムが計算・過去データ・台帳から出します）。<br>
    <b>すでにエクセル・ワード等で記録している項目は、入力せず元のファイルを【総務・DX推進室】に渡してください（こちらで取り込みます）。</b></p>
    <div id="form"></div>
  </div>
  <footer class="site-footer">
    <span class="site-footer__location">たまき青空病院グループ</span>
    <span class="site-footer__powered">
      powered by
      <img src="assets/logo.png" alt="たまき青空病院グループ" class="site-footer__logo">
    </span>
  </footer>
</section>

<script src="assets/input.js?v=20260525v"></script>
</body>
</html>
