<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<meta name="googlebot" content="noindex,nofollow">
<title>全体会議資料</title>
<link rel="icon" href="assets/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="stylesheet" href="assets/style.css?v=20260528d">
</head>
<body>

<!-- ログインゲート -->
<section id="login" class="page active">
  <form id="login-form" class="login-card">
    <img class="login-logo" src="assets/logo.png" alt="たまき青空病院グループ">
    <h1>全体会議資料</h1>
    <label>ID<input id="uid" autocomplete="username" required></label>
    <label>パスワード<input id="upw" type="password" autocomplete="current-password" required></label>
    <button type="submit">ログイン</button>
    <p id="login-err" class="err"></p>
  </form>
</section>

<!-- ダッシュボード -->
<section id="dash" class="page">
  <div id="stickyhead">
    <header class="topbar">
      <img class="topbar-logo" src="assets/logo.png" alt="たまき青空病院グループ">
      <span class="brand">全体会議資料</span>
      <span id="week-label" class="week"></span>
      <button id="print-btn" class="link" title="A4縦の配布資料を印刷／PDF保存">🖨 印刷</button>
      <button id="logout" class="link">ログアウト</button>
    </header>
    <nav id="fac-tabs" class="tabs"></nav>
    <nav id="dept-tabs" class="tabs sub"></nav>
  </div>
  <div class="split">
    <div class="left">
      <h2 id="table-title">配布資料（最新週）</h2>
      <div id="metric-grid" class="mgrid"></div>
    </div>
    <div class="right">
      <h2 id="charts-title">グラフ（週次推移）</h2>
      <div id="charts" class="charts"></div>
    </div>
  </div>
  <footer class="site-footer">
    <span class="site-footer__location">たまき青空病院グループ</span>
    <span class="site-footer__powered">
      powered by
      <img src="assets/logo.png" alt="たまき青空病院グループ" class="site-footer__logo">
    </span>
  </footer>
</section>

<!-- 配布資料（印刷／PDF用・A4縦4枚・通常は非表示、印刷時のみ表示） -->
<div id="print-root" aria-hidden="true"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="assets/app.js?v=20260528d"></script>
</body>
</html>
